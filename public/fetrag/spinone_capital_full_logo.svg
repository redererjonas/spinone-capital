            <stop stop-color="#6366F1"/>
            <stop offset="1" stop-color="#A855F7"/>
        </linearGradient>
    </defs>

    <!-- Icon Section -->
    <rect width="48" height="48" rx="12" fill="url(#logoGradFull)"/>
